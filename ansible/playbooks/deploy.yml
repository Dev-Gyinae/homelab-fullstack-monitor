---
- name: Deploy homelab stack to Docker Swarm (Minimal)
  hosts: all
  become: yes
  gather_facts: yes

  tasks:
    - name: Ensure Docker is running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Check if Swarm is already active
      command: docker info --format '{{ '{{' }}.Swarm.LocalNodeState{{ '}}' }}'
      register: swarm_state
      changed_when: false

    - name: Initialize Docker Swarm (if not active)
      command: docker swarm init --advertise-addr {{ ansible_default_ipv4.address }}
      when: swarm_state.stdout != 'active'
      register: swarm_init
      changed_when: swarm_init.rc == 0

    - name: Create project directory on remote host
      file:
        path: "/home/{{ ansible_user }}/homelab-fullstack-monitor"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Create .env file on remote host
      copy:
        dest: "/home/{{ ansible_user }}/homelab-fullstack-monitor/.env"
        content: |
          POSTGRES_USER={{ postgres_user }}
          POSTGRES_PASSWORD={{ postgres_password }}
          POSTGRES_DB={{ postgres_db }}
          RABBITMQ_USER={{ rabbitmq_user }}
          RABBITMQ_PASS={{ rabbitmq_password }}
          RABBITMQ_COOKIE={{ rabbitmq_cookie }}
          SWARMPIT_DB_USER={{ swarmpit_db_user }}
          SWARMPIT_DB_PASS={{ swarmpit_db_pass }}
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'

    - name: Copy docker-compose.yml to remote host
      copy:
        src: "{{ stack_compose_file }}"
        dest: "/home/{{ ansible_user }}/homelab-fullstack-monitor/docker-compose.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'

    - name: Deploy stack using Docker Swarm
      command: >
        docker stack deploy -c /home/{{ ansible_user }}/homelab-fullstack-monitor/docker-compose.yml {{ stack_name }}
      environment:
        POSTGRES_USER: "{{ postgres_user }}"
        POSTGRES_PASSWORD: "{{ postgres_password }}"
        POSTGRES_DB: "{{ postgres_db }}"
        RABBITMQ_USER: "{{ rabbitmq_user }}"
        RABBITMQ_PASS: "{{ rabbitmq_password }}"
        RABBITMQ_COOKIE: "{{ rabbitmq_cookie }}"
        SWARMPIT_DB_USER: "{{ swarmpit_db_user }}"
        SWARMPIT_DB_PASS: "{{ swarmpit_db_pass }}"
      register: stack_deploy
      changed_when: stack_deploy.rc == 0

    - name: Wait for services to stabilise
      pause:
        seconds: 20

    - name: Show running stack services
      command: docker stack services {{ stack_name }}
      register: services
      changed_when: false

    - debug:
        var: services.stdout_lines
