version: '3.8'

networks:
  homelab-net:
    driver: overlay
    name: homelab-net

volumes:
  postgres_data:
    name: homelab-postgres-data
  rabbitmq_data:
    name: homelab-rabbitmq-data
  elasticsearch_data:
    name: homelab-elasticsearch-data
  uptime_kuma_data:
    name: homelab-uptime-kuma-data
  swarmpit_db_data:
    name: homelab-swarmpit-db-data

services:
  postgres:
    image: postgres:16-alpine
    container_name: homelab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: homelab-rabbitmq
    hostname: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_COOKIE}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: homelab-elasticsearch
    hostname: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 10s
      timeout: 5s
      retries: 10

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: homelab-uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "3001:3001"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD", "node", "/app/extra/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: homelab-backend:latest
    container_name: homelab-backend
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      CELERY_BROKER_URL: pyamqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672//
      ELASTICSEARCH_URL: http://elasticsearch:9200
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - homelab-net
    depends_on:
      - postgres
      - rabbitmq
      - elasticsearch

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    image: homelab-worker:latest
    container_name: homelab-worker
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      CELERY_BROKER_URL: pyamqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672//
      ELASTICSEARCH_URL: http://elasticsearch:9200
    volumes:
      - ./backend:/app
    networks:
      - homelab-net
    depends_on:
      - postgres
      - rabbitmq
      - elasticsearch

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: homelab-frontend:latest
    container_name: homelab-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - homelab-net
    depends_on:
      - backend

  swarmpit-app:
    image: swarmpit/swarmpit:latest
    container_name: homelab-swarmpit-app
    restart: unless-stopped
    environment:
      SWARMPIT_DB: http://swarmpit-db:5984
      SWARMPIT_INFLUXDB: http://influxdb:8086
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8888:8080"
    networks:
      - homelab-net
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]

  swarmpit-db:
    image: couchdb:2.3
    container_name: homelab-swarmpit-db
    restart: unless-stopped
    volumes:
      - swarmpit_db_data:/opt/couchdb/data
    environment:
      COUCHDB_USER: ${SWARMPIT_DB_USER}
      COUCHDB_PASSWORD: ${SWARMPIT_DB_PASS}
    networks:
      - homelab-net
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]

  swarmpit-agent:
    image: swarmpit/agent:latest
    container_name: homelab-swarmpit-agent
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "1.41"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - homelab-net
    deploy:
      mode: global
