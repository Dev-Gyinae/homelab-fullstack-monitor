version: '3.8'

# Networks
networks:
  homelab-net:
    driver: bridge
    name: homelab-net

# Named volumes for persistent data
volumes:
  postgres_data:
    name: homelab-postgres-data
  rabbitmq_data:
    name: homelab-rabbitmq-data
  elasticsearch_data:
    name: homelab-elasticsearch-data
  uptime_kuma_data:
    name: homelab-uptime-kuma-data

services:
  # -------------------- PostgreSQL --------------------
  postgres:
    image: postgres:16-alpine
    container_name: homelab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-homelab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homelab123}
      POSTGRES_DB: ${POSTGRES_DB:-homelab_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homelab} -d ${POSTGRES_DB:-homelab_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------- RabbitMQ --------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: homelab-rabbitmq
    hostname: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-admin123}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_COOKIE:-secret-cookie}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------- Elasticsearch --------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: homelab-elasticsearch
    hostname: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -------------------- Uptime Kuma --------------------
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: homelab-uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "3001:3001"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD", "node", "/app/extra/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -------------------- Backend API (FastAPI) --------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homelab-backend
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - CELERY_BROKER_URL=pyamqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672//
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - homelab-net
    depends_on:
      - postgres
      - rabbitmq
      - elasticsearch
    # healthcheck temporarily disabled
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 10
    #   start_period: 20s

  # -------------------- Celery Worker --------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: homelab-worker
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - CELERY_BROKER_URL=pyamqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672//
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    volumes:
      - ./backend:/app
    networks:
      - homelab-net
    depends_on:
      - postgres
      - rabbitmq
      - elasticsearch
    # healthcheck temporarily disabled
    # healthcheck:
    #   test: ["CMD", "celery", "-A", "worker.celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 10
    #   start_period: 20s

  # -------------------- Frontend (React + Nginx) --------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: homelab-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - homelab-net
    depends_on:
      - backend
    # healthcheck temporarily disabled
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost/"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 5
    #   start_period: 10s
